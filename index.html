<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markiyan Palisa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      cursor: none !important;
    }

    :root {
      --bg:   #D9D9D9;
      --dark: #3F3F49;
      --blue: #0022FF;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.05em;
      color: var(--dark);
    }

    /* BACKGROUND */
    .bg {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 0;
      transition: background 0.5s ease;
    }

    .bg::before {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(circle, color-mix(in srgb, var(--dark) 20%, transparent) 6%, transparent 1%),
        radial-gradient(circle, transparent 100%, transparent 100%);
      background-size: 50px 50px;
      background-position: var(--px, 0px) var(--py, 0px);
    }

    /* CURSOR */
    .cursor {
      position: fixed;
      width: 100px; height: 100px;
      transition: width 0.2s ease, height 0.2s ease;
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      background: white;
      mix-blend-mode: difference;
      will-change: left, top;
    }

    /* HELLO */
    .hello {
      position: fixed;
      top: 22vh; left: 3.5vw;
      font-size: clamp(16px, 2.2vw, 34px);
      font-weight: 400;
      color: var(--dark);
      z-index: 10;
      transition: color 0.5s ease;
    }

    /* MARQUEE */
    .marquee-wrap {
      position: fixed;
      top: 50%; left: 0; width: 100%;
      transform: translateY(-52%);
      overflow: hidden;
      white-space: nowrap;
      padding-bottom: 0.18em;
      z-index: 5;
    }

    .marquee-track {
      display: inline-flex;
      will-change: transform;
      animation: scroll 120s linear infinite;
    }

    .marquee-track span {
      font-size: clamp(80px, 20vh, 280px);
      font-weight: 400;
      color: var(--dark);
      letter-spacing: -0.05em;
      line-height: 1.15;
      padding-right: 0.25em;
      user-select: none;
      transition: color 0.5s ease;
    }

    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* BADGE */
    .badge {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--blue); color: var(--bg);
      font-size: clamp(16px, 2.2vw, 34px);
      font-weight: 400;
      padding: 0.18em 0.5em 0.22em;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
      transition: background 0.5s ease;
    }

    /* BOTTOM BAR */
    .bottom {
      position: fixed;
      bottom: 3.5vh; left: 0; width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 3.5vw;
      z-index: 10;
    }

    .bottom-item {
      display: flex; flex-direction: column;
      align-items: flex-start;
      text-decoration: none;
      color: var(--dark);
      background: none;
      border: none;
      padding: 0;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.05em;
      transition: color 0.2s ease;
    }

    .bottom-item:hover span {
      color: var(--blue);
      text-decoration: underline;
    }

    .bottom-item span {
      font-size: clamp(10px, 1.2vw, 18px);
      font-weight: 400;
      color: var(--dark);
      line-height: 1.1;
      transition: color 0.5s ease;
    }

    a { color: inherit; text-decoration: none; cursor: none !important; }

  </style>
</head>
<body>

  <div class="bg" id="bg"></div>
  <div class="cursor" id="cursor"></div>

  <div class="hello">Hello, My name is</div>

  <div class="marquee-wrap">
    <div class="marquee-track" id="track">
      <span>— Markiyan Palisa </span>
    </div>
  </div>

  <div class="badge" id="badge">[Portfolio is under renovations]</div>

  <div class="bottom">
    <a class="bottom-item" href="https://www.linkedin.com/in/markiyan-palisa/" target="_blank">
      <span>Let's connect:</span>
      <span>Connect with me on LinkedIn</span>
    </a>
    <a class="bottom-item" href="mailto:contact@markiyan.design">
      <span>Contact me:</span>
      <span>contact@markiyan.design</span>
    </a>
    <button class="bottom-item" id="themeToggle">
      <span>Appearance:</span>
      <span>[CHANGE THEME]</span>
    </button>
  </div>

  <script>

    /* ── THEMES — exact colors from palette screenshot ── */
    const themes = [
      { name: 'default',                  bg: '#D9D9D9', dark: '#3F3F49', blue: '#0022FF' },
      { name: 'cozy-neutral-chic',        bg: '#EEE0D6', dark: '#B07E80', blue: '#B07E80' },
      { name: 'sun-kissed-serenity',      bg: '#F03E3E', dark: '#F9E236', blue: '#FFFFFF' },
      { name: 'midnight-sun-fun',         bg: '#0A0A0A', dark: '#0B1628', blue: '#F5A800' },
      { name: 'silent-night',             bg: '#0A0A0A', dark: '#F5F3EC', blue: '#A8A080' },
      { name: 'bubblegum-dream',          bg: '#E8604A', dark: '#112240', blue: '#C8D8D5' },
      { name: 'serene-blue-sky',          bg: '#D6EEFF', dark: '#1A3A5C', blue: '#87CEEB' },
      { name: 'mermaid-bubblegum',        bg: '#E0FBF0', dark: '#3ECFB2', blue: '#F0907A' },
      { name: 'ethereal-ivory',           bg: '#DEC9AF', dark: '#F5EDE0', blue: '#E8EDE6' },
      { name: 'lemon-zest-delight',       bg: '#4A5C28', dark: '#3A4E20', blue: '#F0F5D8' },
      { name: 'deep-teal',                bg: '#0A6E6E', dark: '#3AADA0', blue: '#E8F5F5' },
    ];

    let currentIndex = 0;

    // Luminance helper for contrast check
    function luminance(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const toL = c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
      return 0.2126*toL(r) + 0.7152*toL(g) + 0.0722*toL(b);
    }

    function contrastRatio(a, b) {
      const l1 = luminance(a), l2 = luminance(b);
      return (Math.max(l1,l2)+0.05) / (Math.min(l1,l2)+0.05);
    }

    function applyTheme(index) {
      const t = themes[index];
      const root = document.documentElement;
      root.style.setProperty('--bg',   t.bg);
      root.style.setProperty('--dark', t.dark);
      root.style.setProperty('--blue', t.blue);

      // Pick badge text: use --bg if contrast vs --blue is ok, else use --dark
      const badge = document.getElementById('badge');
      const contrastWithBg   = contrastRatio(t.blue, t.bg);
      const contrastWithDark = contrastRatio(t.blue, t.dark);
      badge.style.color = contrastWithBg >= contrastWithDark ? t.bg : t.dark;
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      let next;
      do {
        next = Math.floor(Math.random() * themes.length);
      } while (next === currentIndex);
      currentIndex = next;
      applyTheme(currentIndex);
    });

    /* ── MARQUEE ── */
    const track = document.getElementById('track');
    while (track.scrollWidth < window.innerWidth * 2) {
      track.innerHTML += '<span>— Markiyan Palisa </span>';
    }
    track.innerHTML += track.innerHTML;

    /* ── BACKGROUND DOT GRID ── */
    const bg       = document.getElementById('bg');
    const tileSize = 50;
    const maxSpeed = 0.6;

    let dx = 0, dy = 0;
    let posX = 0, posY = 0;

    bg.addEventListener('mousemove', (e) => {
      const rect = bg.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width  - 0.5) * 2;
      const y = ((e.clientY - rect.top)  / rect.height - 0.5) * 2;
      const dist = Math.min(Math.sqrt(x*x + y*y) / Math.SQRT2, 1);
      const len  = Math.sqrt(x*x + y*y) || 1;
      const speed = maxSpeed * Math.pow(dist, 1.5);
      dx = (x / len) * speed;
      dy = (y / len) * speed;
    });

    /* ── CURSOR ── */
    const cursor = document.getElementById('cursor');
    let mouseX = -200, mouseY = -200;

    document.querySelectorAll('a, .bottom-item').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.width = '40px';
        cursor.style.height = '40px';
      });
      el.addEventListener('mouseleave', () => {
        cursor.style.width = '100px';
        cursor.style.height = '100px';
      });
    });

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    /* ── ANIMATION LOOP ── */
    function animate() {
      posX += dx;
      posY += dy;
      posX = ((posX % tileSize) + tileSize) % tileSize;
      posY = ((posY % tileSize) + tileSize) % tileSize;
      bg.style.setProperty('--px', `${posX}px`);
      bg.style.setProperty('--py', `${posY}px`);

      cursor.style.left = mouseX + 'px';
      cursor.style.top  = mouseY + 'px';

      requestAnimationFrame(animate);
    }
    applyTheme(0);
    animate();

  </script>
</body>
</html>
