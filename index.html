<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markiyan Palisa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      cursor: none !important;
    }

    :root {
      --bg:   #D9D9D9;
      --dark: #3F3F49;
      --blue: #0022FF;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.05em;
      color: var(--dark);
    }

    /* BACKGROUND */
    .bg {
      position: fixed; inset: 0;
      background: #dedede;
      z-index: 0;
    }

    .bg::before {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(circle, rgba(63,63,73,0.20) 6%, transparent 1%),
        radial-gradient(circle, transparent 100%, transparent 100%);
      background-size: 50px 50px;
      background-position: var(--px, 0px) var(--py, 0px);
    }

    /* CURSOR */
    .cursor {
      position: fixed;
      width: 100px; height: 100px;
      transition: width 0.2s ease, height 0.2s ease;
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      background: white;
      mix-blend-mode: difference;
      will-change: left, top;
    }

    /* HELLO */
    .hello {
      position: fixed;
      top: 22vh; left: 3.5vw;
      font-size: clamp(16px, 2.2vw, 34px);
      font-weight: 400;
      z-index: 10;
    }

    /* MARQUEE */
    .marquee-wrap {
      position: fixed;
      top: 50%; left: 0; width: 100%;
      transform: translateY(-52%);
      overflow: hidden;
      white-space: nowrap;
      padding-bottom: 0.18em;
      z-index: 5;
    }

    .marquee-track {
      display: inline-flex;
      will-change: transform;
      animation: scroll 120s linear infinite;
    }

    .marquee-track span {
      font-size: clamp(80px, 20vh, 280px);
      font-weight: 400;
      color: var(--dark);
      letter-spacing: -0.05em;
      line-height: 1.15;
      padding-right: 0.25em;
      user-select: none;
    }

    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* BADGE */
    .badge {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--blue); color: #fff;
      font-size: clamp(16px, 2.2vw, 34px);
      font-weight: 400;
      padding: 0.18em 0.5em 0.22em;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
    }

    /* BOTTOM BAR */
    .bottom {
      position: fixed;
      bottom: 3.5vh; left: 0; width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 3.5vw;
      z-index: 10;
    }

    .bottom-item {
      display: flex; flex-direction: column;
      align-items: flex-start;
      text-decoration: none;
      color: var(--dark);
      transition: color 0.2s ease;
    }

    .bottom-item:hover span {
      color: var(--blue);
      text-decoration: underline;
    }

    .bottom-item span {
      font-size: clamp(10px, 1.2vw, 18px);
      font-weight: 400;
      color: var(--dark);
      line-height: 1.1;
    }

    a { color: inherit; text-decoration: none; cursor: none !important; }

  </style>
</head>
<body>

  <div class="bg" id="bg"></div>
  <div class="cursor" id="cursor"></div>

  <div class="hello">Hello, My name is</div>

  <div class="marquee-wrap">
    <div class="marquee-track" id="track">
      <span>— Markiyan Palisa </span>
    </div>
  </div>

  <div class="badge">[Portfolio is under renovations]</div>

  <div class="bottom">
    <a class="bottom-item" href="https://theturnnlab.com" target="_blank">
      <span>Current Position</span>
      <span>Digital Designer @ The Turn Lab</span>
    </a>
    <a class="bottom-item" href="#" target="_blank">
      <span>Let's connect:</span>
      <span>Connect with me on LinkedIn</span>
    </a>
    <a class="bottom-item" href="mailto:contact@markiyan.design">
      <span>Contact me:</span>
      <span>contact@markiyan.design</span>
    </a>
  </div>

  <script>

    /* ── MARQUEE — auto-fill then clone for seamless loop ── */
    const track = document.getElementById('track');

    // Fill until wider than 2x screen
    while (track.scrollWidth < window.innerWidth * 2) {
      track.innerHTML += '<span>— Markiyan Palisa </span>';
    }
    // Clone the whole thing — now -50% = exactly one full set
    track.innerHTML += track.innerHTML;


    /* ── BACKGROUND DOT GRID ── */
    const bg       = document.getElementById('bg');
    const tileSize = 50;
    const maxSpeed = 0.6;

    let dx = 0, dy = 0;
    let posX = 0, posY = 0;

    bg.addEventListener('mousemove', (e) => {
      const rect = bg.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width  - 0.5) * 2;
      const y = ((e.clientY - rect.top)  / rect.height - 0.5) * 2;
      const dist = Math.min(Math.sqrt(x*x + y*y) / Math.SQRT2, 1);
      const len  = Math.sqrt(x*x + y*y) || 1;
      const speed = maxSpeed * Math.pow(dist, 1.5);
      dx = (x / len) * speed;
      dy = (y / len) * speed;
    });


    /* ── CURSOR ── */
    const cursor = document.getElementById('cursor');
    let mouseX = -200, mouseY = -200;

    document.querySelectorAll('a, .bottom-item').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.width = '40px';
        cursor.style.height = '40px';
      });
      el.addEventListener('mouseleave', () => {
        cursor.style.width = '100px';
        cursor.style.height = '100px';
      });
    });

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });


    /* ── ANIMATION LOOP ── */
    function animate() {
      posX += dx;
      posY += dy;
      posX = ((posX % tileSize) + tileSize) % tileSize;
      posY = ((posY % tileSize) + tileSize) % tileSize;
      bg.style.setProperty('--px', `${posX}px`);
      bg.style.setProperty('--py', `${posY}px`);

      cursor.style.left = mouseX + 'px';
      cursor.style.top  = mouseY + 'px';

      requestAnimationFrame(animate);
    }
    animate();

  </script>
</body>
</html>
